<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Flight Simulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #threeContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to Cesium if needed, but we'll probably capture them in Three.js for HUD */
        }
        #uiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            box-sizing: border-box;
            padding: 30px;
        }
        #hud-top-left {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 20px;
        }
        #hud-speed-box {
            position: absolute;
            top: 50%;
            left: 25%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #hud-alt-box {
            position: absolute;
            top: 50%;
            right: 25%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .value-box {
            border: 2px solid #0f0;
            padding: 5px 15px;
            font-size: 24px;
            margin-top: 5px;
            min-width: 80px;
            text-align: center;
            background: rgba(0, 255, 0, 0.1);
            position: relative;
        }
        /* Bracket effect */
        .value-box::before, .value-box::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 100%;
            border-top: 2px solid #0f0;
            border-bottom: 2px solid #0f0;
            top: -2px;
        }
        .value-box::before { left: -2px; border-left: 2px solid #0f0; }
        .value-box::after { right: -2px; border-right: 2px solid #0f0; }

        #minimap-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            background: rgba(0, 40, 0, 0.3);
        }
        #minimap {
            width: 100%;
            height: 100%;
        }
        #weapon-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
            font-size: 18px;
        }
        .weapon-info span {
            display: inline-block;
            width: 50px;
            text-align: right;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="threeContainer"></div>
    <div id="uiContainer">
        <div id="hud-top-left">
            TIME <span id="time">00:00:00</span><br>
            SCORE <span id="score">000000</span>
        </div>
        
        <div id="hud-speed-box">
            <div class="label">SPEED</div>
            <div class="value-box">
                <span id="speed">0</span>
            </div>
        </div>

        <div id="hud-alt-box">
            <div class="label">ALT</div>
            <div class="value-box">
                <span id="altitude">0</span>
            </div>
        </div>

        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
