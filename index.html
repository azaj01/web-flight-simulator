<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Flight Simulator</title>
    <style>
        @font-face {
            font-family: 'AceCombat';
            src: url('/assets/fonts/ACES07_Regular.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'AceCombat', 'Courier New', Courier, monospace;
        }
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        #threeContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        #threeContainer.hidden {
            display: none !important;
        }
        #uiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #0f0;
            font-family: 'AceCombat', 'Courier New', Courier, monospace;
            pointer-events: none;
            box-sizing: border-box;
            padding: 30px;
            z-index: 10;
        }
        #uiContainer.hidden {
            display: none !important;
        }
        #hud-top-left {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 20px;
        }
        #hud-speed-box {
            position: absolute;
            top: 50%;
            left: 25%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #hud-alt-box {
            position: absolute;
            top: 50%;
            right: 25%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .value-box {
            border: 2px solid #0f0;
            padding: 5px 15px;
            font-size: 24px;
            margin-top: 5px;
            min-width: 80px;
            text-align: center;
            background: rgba(0, 255, 0, 0.1);
            position: relative;
        }
        /* Bracket effect */
        .value-box::before, .value-box::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 100%;
            border-top: 2px solid #0f0;
            border-bottom: 2px solid #0f0;
            top: -2px;
        }
        .value-box::before { left: -2px; border-left: 2px solid #0f0; }
        .value-box::after { right: -2px; border-right: 2px solid #0f0; }

        #minimap-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            background: rgba(0, 40, 0, 0.3);
        }
        #minimap {
            width: 100%;
            height: 100%;
        }
        
        /* Menu and Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            z-index: 100;
            pointer-events: auto;
        }
        
        .overlay.hidden {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }

        #transition-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.8) 120%);
            pointer-events: none;
            z-index: 8;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        
        .menu-title {
            font-family: 'AceCombat', sans-serif;
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #0f0;
            color: #0f0;
        }
        
        .menu-btn {
            font-family: 'AceCombat', sans-serif;
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            margin: 10px;
            min-width: 200px;
            transition: all 0.3s;
        }
        
        .menu-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        #spawn-instruction {
            font-family: 'AceCombat', sans-serif;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 40, 0, 0.8);
            border: 1px solid #0f0;
            padding: 10px 20px;
            color: #0f0;
            z-index: 50;
            pointer-events: none;
        }

        #weapon-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
            font-size: 18px;
        }
        .weapon-info span {
            display: inline-block;
            width: 50px;
            text-align: right;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="threeContainer"></div>
    
    <!-- Main Menu -->
    <div id="mainMenu" class="overlay">
        <h1 class="menu-title">WEB FLIGHT SIMULATOR</h1>
        <button id="startBtn" class="menu-btn">START SIMULATION</button>
        <button id="optionsBtn" class="menu-btn">OPTIONS</button>
    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="overlay hidden">
        <h2 class="menu-title">PAUSED</h2>
        <button id="resumeBtn" class="menu-btn">RESUME</button>
        <button id="restartBtn" class="menu-btn">RESTART</button>
        <button id="quitBtn" class="menu-btn">QUIT TO MENU</button>
    </div>

    <!-- Crash Menu -->
    <div id="crashMenu" class="overlay hidden">
        <h2 class="menu-title" style="color: #f00; text-shadow: 0 0 10px #f00;">AIRCRAFT DESTROYED</h2>
        <button id="respawnBtn" class="menu-btn" style="border-color: #f00; color: #f00;">RESPAWN</button>
    </div>

    <!-- Spawn Instruction -->
    <div id="spawnInstruction" class="hidden">
        <div id="spawn-instruction">CLICK ANYWHERE ON THE MAP TO CHOOSE SPAWN POINT</div>
        <button id="confirmSpawnBtn" class="menu-btn hidden" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 100;">CONFIRM SPAWN POINT</button>
    </div>

    <div id="uiContainer" class="hidden">
        <div id="hud-top-left">
            TIME <span id="time">00:00:00</span><br>
            SCORE <span id="score">000000</span>
        </div>
        
        <div id="hud-speed-box">
            <div class="label">SPEED</div>
            <div class="value-box">
                <span id="speed">0</span>
            </div>
        </div>

        <div id="hud-alt-box">
            <div class="label">ALT</div>
            <div class="value-box">
                <span id="altitude">0</span>
            </div>
        </div>

        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
    </div>

    <div id="transition-vignette"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
